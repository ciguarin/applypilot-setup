# Job search configuration
# Copy to ~/.applypilot/searches.yaml and edit for your target roles/location

defaults:
  location: "Toronto"      # Primary city for onsite/hybrid filtering
  distance: 50             # km radius
  hours_old: 168           # Only fetch listings posted within this many hours (168 = 1 week)
  results_per_site: 50

locations:
  - location: "Toronto"
    remote: true
  - location: "Ontario"
    remote: true
  - location: "Canada"
    remote: true

queries:
  - query: "Software Intern"
    tier: 1
  - query: "Software Developer Intern"
    tier: 2
  - query: "Backend Engineer Intern"
    tier: 3
  - query: "Full Stack Developer Intern"
    tier: 3
  - query: "Developer Intern"
    tier: 3
  - query: "Data Analyst Intern"
    tier: 3
  - query: "DevOps Intern"
    tier: 3
  - query: "Junior Developer"
    tier: 3
  - query: "Junior Software Engineer"
    tier: 3
